<!DOCTYPE html>
<html>
<head>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@19",
        "react-dom/client": "https://esm.sh/react-dom@19/client"
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState } from 'react';
    import ReactDOM from 'react-dom/client';

    function TodoApp() {
      const [todos, setTodos] = useState([
        { id: 1, text: 'Learn React 19', done: false },
        { id: 2, text: 'Master single-file builds', done: false }
      ]);
      const [newTodo, setNewTodo] = useState('');

      const addTodo = () => {
        if (!newTodo.trim()) return;
        setTodos([...todos, { id: Date.now(), text: newTodo, done: false }]);
        setNewTodo('');
      };

      const toggleTodo = (id) => {
        setTodos(t => t.map(item => item.id === id ? { ...item, done: !item.done } : item));
      };

      return (
        <div style={{ fontFamily: 'sans-serif', maxWidth: '400px' }}>
          <h1>Todo List</h1>
          <input 
            value={newTodo} 
            onChange={e => setNewTodo(e.target.value)} 
            placeholder="What needs doing?" 
          />
          <button onClick={addTodo}>Add</button>
          
          <ul>
            {todos.map(todo => (
              <li key={todo.id} style={{ marginBottom: '8px' }}>
                <span 
                  onClick={() => toggleTodo(todo.id)}
                  style={{ 
                    textDecoration: todo.done ? 'line-through' : 'none',
                    cursor: 'pointer',
                    marginRight: '10px'
                  }}
                >
                  {todo.text}
                </span>
                <button onClick={() => setTodos(t => t.filter(x => x.id !== todo.id))}>
                  &times;
                </button>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<TodoApp />);
  </script>
</body>
</html>
